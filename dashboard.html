<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <style>
        html.dark { background-color: #1a1a1a; }
    </style>
    <!-- Firebase SDKs (compat for simplicity) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-storage-compat.js"></script>
    <script src="firebase.js"></script>
</head>
<body class="bg-white dark:bg-[#1a1a1a] text-gray-900 dark:text-gray-100">
    <header class="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
        <h1 class="text-xl font-semibold">Owner Dashboard</h1>
        <div class="space-x-2">
            <span id="user-email" class="text-sm text-gray-500"></span>
            <button id="sign-in-btn" class="px-3 py-2 bg-blue-600 text-white rounded">Sign In</button>
            <button id="sign-out-btn" class="px-3 py-2 bg-gray-700 text-white rounded hidden">Sign Out</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-8">
        <!-- Create Project -->
        <section class="p-4 rounded border border-gray-200 dark:border-gray-700">
            <h2 class="text-lg font-semibold mb-4">Create or Update Project</h2>
            <form id="project-form" class="space-y-4">
                <div>
                    <label class="block text-sm mb-1">Project ID (a-z0-9-dash)</label>
                    <input id="project-id" class="w-full px-3 py-2 rounded bg-white dark:bg-[#2d2d2d] border border-gray-300 dark:border-gray-600" placeholder="e.g., client-acme-q4-report" required>
                </div>
                <div>
                    <label class="block text-sm mb-1">Title</label>
                    <input id="title" class="w-full px-3 py-2 rounded bg-white dark:bg-[#2d2d2d] border border-gray-300 dark:border-gray-600" required>
                </div>
                <div>
                    <label class="block text-sm mb-1">Visibility</label>
                    <select id="visibility" class="w-full px-3 py-2 rounded bg-white dark:bg-[#2d2d2d] border border-gray-300 dark:border-gray-600">
                        <option value="private">Private (owner only)</option>
                        <option value="client">Client preview</option>
                        <option value="public">Public</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm mb-1">Sections (JSON array of {heading, html})</label>
                    <textarea id="sections" rows="6" class="w-full px-3 py-2 rounded bg-white dark:bg-[#2d2d2d] border border-gray-300 dark:border-gray-600" placeholder='[
  {"heading":"Intro","html":"<p>Summary...</p>"},
  {"heading":"Findings","html":"<ul><li>...</li></ul>"}
]'></textarea>
                </div>
                <div>
                    <label class="block text-sm mb-2">Upload Media (images/videos)</label>
                    <input id="media-files" type="file" multiple accept="image/*,video/*" class="block">
                    <div id="upload-progress" class="text-sm text-gray-500 mt-2"></div>
                </div>
                <div class="flex gap-2">
                    <button id="save-project" type="submit" class="px-4 py-2 bg-green-600 text-white rounded">Save Project</button>
                    <a id="viewer-link" href="#" target="_blank" class="px-4 py-2 border rounded">Open Client Viewer</a>
                </div>
            </form>
        </section>

        <!-- Existing Projects -->
        <section class="p-4 rounded border border-gray-200 dark:border-gray-700">
            <h2 class="text-lg font-semibold mb-4">Projects</h2>
            <div id="projects-list" class="space-y-2"></div>
        </section>
    </main>

    <script src="dashboard.js"></script>
</body>
</html>
